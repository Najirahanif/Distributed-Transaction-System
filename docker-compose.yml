services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    networks:
      - saga-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MONGODB UI (Mongo Express)
  # ============================================
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ""
      ME_CONFIG_MONGODB_ADMINPASSWORD: ""
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_OPTIONS_EDITORTHEME: "default"
      ME_CONFIG_SITE_BASEURL: "/"
    depends_on:
      - mongodb
    networks:
      - saga-network
    restart: on-failure

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - saga-network

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - saga-network

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/order-db?replicaSet=rs0
      - KAFKA_BROKER=kafka:9092
      - CLIENT_ID=order-service
      - PORT=3001
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      - mongodb
      - kafka
    networks:
      - saga-network
    restart: on-failure

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "3002:3002"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/inventory-db?replicaSet=rs0
      - KAFKA_BROKER=kafka:9092
      - CLIENT_ID=inventory-service
      - PORT=3002
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      - mongodb
      - kafka
      - order-service
    networks:
      - saga-network
    restart: on-failure

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3003:3003"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/payment-db?replicaSet=rs0
      - KAFKA_BROKER=kafka:9092
      - CLIENT_ID=payment-service
      - PORT=3003
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      - mongodb
      - kafka
      - inventory-service
      - order-service
    networks:
      - saga-network
    restart: on-failure

networks:
  saga-network:
    driver: bridge