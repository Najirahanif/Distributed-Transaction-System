apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-service
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service

    spec:
      containers:
      - name: inventory-service
        image: najira/inventory-service:1.0
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: inventory-mongo-secret
              key: MONGO_URI

        - name: PORT
          value: "3001"

        - name: CLIENT_ID
          value: "inventory-service"

        - name: KAFKA_BROKER
          value: "kafka:9092"

        - name: KAFKAJS_NO_PARTITIONER_WARNING
          value: "1"