apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service
  namespace: ecommerce

spec:
  replicas: 3

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
      - name: order-service
        image: najira/order-service:1.0
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: order-mongo-secret
              key: MONGO_URI

        - name: PORT
          value: "3001"

        - name: CLIENT_ID
          value: "order-service"

        - name: KAFKA_BROKER
          value: "kafka:9092"

        - name: KAFKAJS_NO_PARTITIONER_WARNING
          value: "1"